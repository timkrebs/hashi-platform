name: terraform

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [dev, staging, main]
  workflow_dispatch:

permissions:
  contents: read

# Never run two pipelines for the same branch or PR at once; an in-flight
# apply must finish before the next one starts.
concurrency:
  group: terraform-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: false

env:
  CONFIG_DIRECTORY: ./infra/aws-eks
  TERRAFORM_VERSION: "1.9.8"

jobs:
  # Map the branch under test to its HCP Terraform workspace and GitHub
  # environment. Pull requests resolve against their base (target) branch.
  resolve:
    name: Resolve target environment
    runs-on: ubuntu-latest
    outputs:
      workspace: ${{ steps.map.outputs.workspace }}
      environment: ${{ steps.map.outputs.environment }}
    steps:
      - id: map
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            branch="${{ github.base_ref }}"
          else
            branch="${{ github.ref_name }}"
          fi
          case "$branch" in
            dev)     ws=hashi-platform-dev;     env=dev ;;
            staging) ws=hashi-platform-staging; env=staging ;;
            main)    ws=hashi-platform-prod;    env=production ;;
            *) echo "Unsupported branch: $branch" >&2; exit 1 ;;
          esac
          echo "workspace=$ws"    >> "$GITHUB_OUTPUT"
          echo "environment=$env" >> "$GITHUB_OUTPUT"
          echo "Resolved '$branch' -> workspace '$ws' (environment '$env')"

  # Static analysis: formatting, validation, and linting.
  static:
    name: fmt, validate, tflint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/aws-eks
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.53.0

      - name: TFLint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tflint --init
          tflint --format compact

  # Security and compliance scanning.
  security:
    name: security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # gitleaks scans full history

      - name: Trivy IaC misconfiguration scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: infra
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # On pull requests: speculative plan against the target workspace (no apply).
  plan:
    name: HCP Terraform plan
    needs: [resolve, static, security]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # required for Vault OIDC; scoped to this job
    steps:
      - uses: actions/checkout@v4

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://hashi-vault-euc1-public-vault-24f28885.731bdaf0.z1.hashicorp.cloud:8200
          namespace: admin/hcp-platform
          method: jwt
          path: jwt-github               # the custom mount, NOT default "jwt"
          role: gha-tfc
          secrets: |
            secret/data/ci/tfc TF_API_TOKEN | TF_API_TOKEN ;
            secret/data/ci/tfc TF_CLOUD_ORGANIZATION | TF_CLOUD_ORGANIZATION

      - name: Upload configuration
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        id: upload
        with:
          workspace: ${{ needs.resolve.outputs.workspace }}
          directory: ${{ env.CONFIG_DIRECTORY }}
          speculative: true

      - name: Create plan-only run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        id: run
        with:
          workspace: ${{ needs.resolve.outputs.workspace }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}
          plan_only: true

      - name: Get plan output
        uses: hashicorp/tfc-workflows-github/actions/plan-output@v1.3.2
        id: plan-output
        with:
          plan: ${{ steps.run.outputs.plan_id }}

      - name: Write plan summary
        run: |
          {
            echo "### HCP Terraform plan - ${{ needs.resolve.outputs.workspace }}"
            echo "Run: ${{ steps.run.outputs.run_link }}"
            echo ""
            echo "Add: ${{ steps.plan-output.outputs.add }}, Change: ${{ steps.plan-output.outputs.change }}, Destroy: ${{ steps.plan-output.outputs.destroy }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # On push/dispatch to dev, staging, or main: apply to the mapped workspace.
  apply:
    name: HCP Terraform apply
    needs: [resolve, static, security]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # required for Vault OIDC; scoped to this job
    # Dynamic per-branch environment. Configure required reviewers on the
    # "production" environment (repo Settings > Environments) to gate prod.
    environment: ${{ needs.resolve.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://hashi-vault-euc1-public-vault-24f28885.731bdaf0.z1.hashicorp.cloud:8200
          namespace: admin/hcp-platform
          method: jwt
          path: jwt-github               # the custom mount, NOT default "jwt"
          role: gha-tfc
          secrets: |
            secret/data/ci/tfc TF_API_TOKEN | TF_API_TOKEN ;
            secret/data/ci/tfc TF_CLOUD_ORGANIZATION | TF_CLOUD_ORGANIZATION

      - name: Upload configuration
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        id: upload
        with:
          workspace: ${{ needs.resolve.outputs.workspace }}
          directory: ${{ env.CONFIG_DIRECTORY }}

      - name: Create run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        id: run
        with:
          workspace: ${{ needs.resolve.outputs.workspace }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}

      - name: Apply run
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.2
        if: ${{ fromJSON(steps.run.outputs.payload).data.attributes.actions.IsConfirmable }}
        with:
          run: ${{ steps.run.outputs.run_id }}
          comment: "Applied from GitHub Actions: ${{ github.sha }}"
