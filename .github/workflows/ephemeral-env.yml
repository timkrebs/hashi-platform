name: ephemeral-env

# On-demand lifecycle for the ephemeral dev/staging environments.
#   up    - deploy (apply) and leave running for manual testing
#   down  - destroy (run this after you finish testing)
#   cycle - deploy, run the load test, then ALWAYS destroy (one shot)
# Prod is intentionally not selectable here.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target ephemeral environment
        type: choice
        options: [dev, staging]
        default: dev
      action:
        description: up = deploy, down = destroy, cycle = deploy + load test + destroy
        type: choice
        options: [cycle, up, down]
        default: cycle
      target_url:
        description: Public URL the load test should hit (required for a real test)
        type: string
        default: ""

permissions:
  contents: read

# Serialize per environment so an apply and a destroy can never overlap.
concurrency:
  group: ephemeral-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  CONFIG_DIRECTORY: ./infra/aws-eks

jobs:
  resolve:
    name: Resolve target workspace
    runs-on: ubuntu-latest
    outputs:
      workspace: ${{ steps.map.outputs.workspace }}
    steps:
      - id: map
        run: |
          case "${{ inputs.environment }}" in
            dev)     ws=hashi-platform-dev ;;
            staging) ws=hashi-platform-staging ;;
            *) echo "::error::Ephemeral lifecycle is only allowed for dev/staging."; exit 1 ;;
          esac
          echo "workspace=$ws" >> "$GITHUB_OUTPUT"
          echo "Resolved '${{ inputs.environment }}' -> '$ws' (action: ${{ inputs.action }})"

  deploy:
    name: Deploy (apply)
    needs: resolve
    if: ${{ inputs.action == 'up' || inputs.action == 'cycle' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://hashi-vault-euc1-public-vault-24f28885.731bdaf0.z1.hashicorp.cloud:8200
          namespace: admin/hcp-platform
          method: jwt
          path: jwt-github
          role: gha-tfc
          secrets: |
            secret/data/ci/tfc TF_API_TOKEN | TF_API_TOKEN ;
            secret/data/ci/tfc TF_CLOUD_ORGANIZATION | TF_CLOUD_ORGANIZATION

      - name: Upload configuration
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        id: upload
        with:
          workspace: ${{ needs.resolve.outputs.workspace }}
          directory: ${{ env.CONFIG_DIRECTORY }}

      - name: Create run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        id: run
        with:
          workspace: ${{ needs.resolve.outputs.workspace }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}
          message: "Ephemeral apply (${{ inputs.action }})"

      - name: Apply run
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.2
        if: ${{ fromJSON(steps.run.outputs.payload).data.attributes.actions.IsConfirmable }}
        with:
          run: ${{ steps.run.outputs.run_id }}
          comment: "Ephemeral apply via GitHub Actions"

  loadtest:
    name: Load test
    needs: [resolve, deploy]
    if: ${{ inputs.action == 'cycle' && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run k6 load test
        run: |
          if [ -z "${{ inputs.target_url }}" ]; then
            echo "::warning::No target_url provided - skipping the real load test."
            echo "Set target_url to your app's public endpoint to exercise the cluster."
            exit 0
          fi
          docker run --rm -i \
            -e TARGET_URL="${{ inputs.target_url }}" \
            -v "$PWD/loadtest:/scripts" \
            grafana/k6 run /scripts/k6-script.js

  destroy:
    name: Destroy
    needs: [resolve, deploy, loadtest]
    # Run for an explicit 'down', or after a 'cycle' whose deploy succeeded -
    # ALWAYS, even if the load test failed, so the environment is never left running.
    if: >
      always() &&
      needs.resolve.result == 'success' &&
      (
        inputs.action == 'down' ||
        (inputs.action == 'cycle' && needs.deploy.result == 'success')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Import secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://hashi-vault-euc1-public-vault-24f28885.731bdaf0.z1.hashicorp.cloud:8200
          namespace: admin/hcp-platform
          method: jwt
          path: jwt-github
          role: gha-tfc
          secrets: |
            secret/data/ci/tfc TF_API_TOKEN | TF_API_TOKEN ;
            secret/data/ci/tfc TF_CLOUD_ORGANIZATION | TF_CLOUD_ORGANIZATION

      - name: Upload configuration
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        id: upload
        with:
          workspace: ${{ needs.resolve.outputs.workspace }}
          directory: ${{ env.CONFIG_DIRECTORY }}

      - name: Create destroy run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        id: run
        with:
          workspace: ${{ needs.resolve.outputs.workspace }}
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}
          is_destroy: true
          message: "Ephemeral teardown (${{ inputs.action }})"

      - name: Apply destroy run
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.2
        if: ${{ fromJSON(steps.run.outputs.payload).data.attributes.actions.IsConfirmable }}
        with:
          run: ${{ steps.run.outputs.run_id }}
          comment: "Ephemeral teardown via GitHub Actions"
